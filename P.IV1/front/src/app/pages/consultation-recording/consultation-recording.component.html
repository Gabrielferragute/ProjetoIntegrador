<div class="recording-dashboard">

  <!-- Header -->
  <header class="top-nav">
    <button class="btn-cancel" (click)="cancelRecording()">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      Cancelar e Sair
    </button>
  </header>

  <!-- Error View -->
  <div class="error-container" *ngIf="state() === 'ERROR'">
    <div class="icon-circle error">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
    </div>
    <h2>Não foi possível gravar</h2>
    <p>{{ errorMessage() }}</p>
    <button class="btn-primary mt-4" (click)="cancelRecording()">Voltar ao Perfil</button>
  </div>

  <!-- Recording View -->
  <div class="recorder-wrapper" *ngIf="state() !== 'ERROR'">
    
    <!-- Status Indicator -->
    <div class="status-badge" [ngClass]="state().toLowerCase()">
      <span class="dot" *ngIf="state() === 'RECORDING'"></span>
      {{ 
        state() === 'RECORDING' ? 'Gravando a consulta...' : 
        state() === 'PAUSED' ? 'Gravação Pausada' :
        state() === 'FINISHED' ? 'Processando e Gerando Laudo...' : 'Iniciando...' 
      }}
    </div>

    <!-- Timer -->
    <div class="timer-display" [class.paused]="state() === 'PAUSED'">
      {{ formattedTime() }}
    </div>

    <!-- Visualizer Canvas -->
    <div class="visualizer-container">
      <canvas #audioCanvas class="audio-canvas"></canvas>
      <!-- Overlay blur when paused -->
      <div class="visualizer-overlay" *ngIf="state() === 'PAUSED'">
         <span>Pausado</span>
      </div>
      <!-- Processing state -->
      <div class="visualizer-overlay process" *ngIf="state() === 'FINISHED'">
         <div class="spinner-small"></div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls" [class.disabled]="state() === 'FINISHED' || state() === 'IDLE'">
      
      <!-- Pause/Resume Button -->
      <button class="btn-round secondary" (click)="togglePause()" [attr.aria-label]="state() === 'PAUSED' ? 'Retomar' : 'Pausar'">
        <svg *ngIf="state() !== 'PAUSED'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <svg *ngIf="state() === 'PAUSED'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      </button>

      <!-- Finish Button -->
      <button class="btn-giant finish" (click)="finishRecording()" *ngIf="state() !== 'FINISHED'">
        <div class="stop-square"></div>
        Finalizar Consulta
      </button>

    </div>

  </div>

</div>
